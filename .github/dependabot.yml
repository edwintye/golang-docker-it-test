version: 2
updates:
- package-ecosystem: gomod
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  reviewers:
  - edwintye
  ignore:
  - dependency-name: github.com/go-redis/redis
    versions:
    - "> 6.15.7+incompatible"
- package-ecosystem: github-actions
  directories: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 5
  rebase-strategy: auto
  reviewers:
    - edwintye
